[theme]
base = "dark"
primaryColor = "#22C55E"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F8FAFC"
font = "sans serif"

[server]
# Disable the source-file watcher in production. It introspects every installed
# module to enable hot-reload, which needlessly imports heavy optional libraries
# (transformers' vision models -> torchvision) and spams the logs with import
# errors. Not needed on Streamlit Cloud.
fileWatcherType = "none"

[browser]
gatherUsageStats = false
