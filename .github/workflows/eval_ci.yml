name: RAG Quality Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Fast, offline unit tests — gate every push cheaply ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tests

      - name: Unit tests
        run: pytest -q

  # ── RAGAS quality gate — runs the real pipeline against the golden set ──────
  # Opt-in: needs LLM/Cohere keys, so it only runs when you set the repo variable
  # RUN_EVAL=true (Settings → Secrets and variables → Actions → Variables) and add
  # the matching secrets. Until then only the fast `test` job runs, keeping the badge green.
  evaluate:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.RUN_EVAL == 'true' }}

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest documents into Qdrant
        env:
          QDRANT_URL: http://localhost:6333
        run: python -m src.ingestion.indexer --source data/raw --recreate

      - name: Run RAGAS evaluation
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          QDRANT_URL: http://localhost:6333
        run: python -m src.evaluation.run_eval --golden data/golden_dataset.json --output results/eval_results.json

      - name: Check quality thresholds (blocks merge on regression)
        run: python -m src.evaluation.threshold --results results/eval_results.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: results/eval_results.json
