name: RAG Quality Gate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Fast, offline unit tests — gate every push cheaply ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tests

      - name: Unit tests
        run: pytest -q

  # ── RAGAS quality gate — runs the real pipeline against the golden set ──────
  evaluate:
    runs-on: ubuntu-latest
    needs: test
    # Skip on PRs from forks where secrets are unavailable.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest documents into Qdrant
        env:
          QDRANT_URL: http://localhost:6333
        run: python -m src.ingestion.indexer --source data/raw --recreate

      - name: Run RAGAS evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "self-healing-rag-ci"
          QDRANT_URL: http://localhost:6333
        run: python -m src.evaluation.run_eval --golden data/golden_dataset.json --output results/eval_results.json

      - name: Check quality thresholds (blocks merge on regression)
        run: python -m src.evaluation.threshold --results results/eval_results.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: results/eval_results.json
